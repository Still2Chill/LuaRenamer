name: Update Manifest

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to process (e.g. v1.2.3)
        required: true
        type: string

concurrency:
  group: update-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: manifest
        fetch-depth: 0
    - name: Update manifest entry
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.event.release.tag_name || inputs.tag }}
        REPO: ${{ github.repository }}
      run: |
        git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
        VERSION="${TAG#v}"; VERSION="${VERSION%%-*}"
        SOURCE_REVISION=$(git rev-list -n 1 "$TAG")
        RELEASED_AT=$(git log -1 --format=%cI "$SOURCE_REVISION")

        ABSTRACTION_VERSION=$(git show "${TAG}:LuaRenamer/LuaRenamer.csproj" | sed -n 's/.*Shoko\.Abstractions.*Version="\([^-"]*\).*/\1/p' | head -1)

        RELEASE_JSON=$(gh api "repos/$REPO/releases/tags/${TAG}")
        PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.prerelease')
        CHANNEL=$([[ "$PRERELEASE" == "true" ]] && echo "Dev" || echo "Stable")
        RELEASE_NOTES=$(echo "$RELEASE_JSON" | jq -r '.body')
        ASSETS_JSON=$(echo "$RELEASE_JSON" | jq '.assets')

        ARCHIVES_JSON=$(echo "$ASSETS_JSON" | jq --arg abstraction "$ABSTRACTION_VERSION" --arg repo "$REPO" --arg tag "$TAG" '
          [ .[] | select(.name | endswith(".zip")) | {
              runtime: (.name | gsub(".*_"; "") | gsub("\\.zip$"; "")),
              abstraction: $abstraction,
              url: .browser_download_url,
              checksum: (.digest | ltrimstr("sha256:"))
            }
          ]
        ')

        RELEASE_ENTRY=$(jq -n \
          --arg version "$VERSION" \
          --arg tag "$TAG" \
          --arg source_revision "$SOURCE_REVISION" \
          --arg released_at "$RELEASED_AT" \
          --arg channel "$CHANNEL" \
          --arg release_notes "$RELEASE_NOTES" \
          --argjson archives "$ARCHIVES_JSON" \
          '{version: $version, tag: $tag, source_revision: $source_revision, released_at: $released_at, channel: $channel, release_notes: $release_notes, archives: $archives}')

        jq --argjson release "$RELEASE_ENTRY" '
          .releases |= [ $release ] + (. | map(select(.version != $release.version or .channel != $release.channel)))
        ' manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json

        if git diff --quiet manifest.json; then
          echo "manifest.json unchanged, skipping commit"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add manifest.json
        git commit -m "ci: update manifest for ${TAG} (${CHANNEL})"
        git push origin HEAD:manifest
